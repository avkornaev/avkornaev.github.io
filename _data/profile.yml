bio_short: >
  Alexei Kornaev is a researcher working at the intersection of computer vision,
  machine learning, medical AI, and robotics. His work focuses on clinically useful
  multimodal models, trustworthy evaluation, and interactive systems that connect
  perception with action in healthcare settings.
research_agenda:
  - title: Robust perception in clinical environments
    text: >
      Building computer vision systems that remain reliable under domain shift,
      limited labels, and heterogeneous acquisition conditions.
  - title: Multimodal medical foundation models
    text: >
      Combining images, reports, signals, and structured metadata to support
      diagnosis, planning, and longitudinal patient modeling.
  - title: Learning for embodied medical systems
    text: >
      Connecting vision, control, and human interaction for assistive and
      interventional robotic systems.
